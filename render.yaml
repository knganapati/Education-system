services:
  # Backend API
  - type: web
    name: skillbridge-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false # Set this in Render dashboard
      - key: MONITORING_API_KEY
        generateValue: true
      - key: APP_ENV
        value: production

